version: 2

project_name: dployr

before:
  hooks:
    - go mod tidy

builds:
  - id: dployr
    main: ./cmd/dployr
    binary: dployr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/dployr-io/dployr/pkg/version.Version={{.Version}}
      - -X github.com/dployr-io/dployr/pkg/version.GitCommit={{.FullCommit}}
      - -X github.com/dployr-io/dployr/pkg/version.BuildDate={{.Date}}
      - -X github.com/dployr-io/dployr/pkg/version.Component=dployr
      - -X github.com/dployr-io/dployr/version.Version={{.Version}}
      - -X github.com/dployr-io/dployr/version.Commit={{.FullCommit}}
      - -X github.com/dployr-io/dployr/version.Date={{.Date}}

  - id: dployrd
    main: ./cmd/dployrd
    binary: dployrd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/dployr-io/dployr/pkg/version.Version={{.Version}}
      - -X github.com/dployr-io/dployr/pkg/version.GitCommit={{.FullCommit}}
      - -X github.com/dployr-io/dployr/pkg/version.BuildDate={{.Date}}
      - -X github.com/dployr-io/dployr/pkg/version.Component=dployrd
      - -X github.com/dployr-io/dployr/version.Version={{.Version}}
      - -X github.com/dployr-io/dployr/version.Commit={{.FullCommit}}
      - -X github.com/dployr-io/dployr/version.Date={{.Date}}

archives:
  - id: default
    wrap_in_directory: true
    name_template: >-
      {{ .ProjectName }}-
      {{- title .Os }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - install.ps1
      - install.sh

# Windows installer with Chocolatey
chocolateys:
  - name: dployr
    title: dployr
    authors: Emmanuel Madehin
    owners: "dployr-io"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    project_url: https://github.com/dployr-io/dployr
    url_template: "https://github.com/dployr-io/dployr/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    copyright: 2025 Emmanuel Madehin
    license_url: "https://raw.githubusercontent.com/dployr-io/dployr/refs/tags/{{ .Tag }}/LICENSE"
    project_source_url: https://github.com/dployr-io/dployr
    tags: "deployment cli devops self-hosted nodejs python go php ruby"
    summary: "Ship apps, not infrastructure."
    description: |
      dployr gives you a real server the moment you sign up. Deploy your apps from the CLI, GitHub Actions, or the dashboard. No SSH, no config files, no waiting.

      Deploy from a git repository or a Docker image. dployr builds your code, starts the service, handles HTTPS, and streams logs back in real time.

      Runtimes: Node.js, Python, Go, PHP, Ruby, .NET, Java, Static, Docker.

      On Hobby and Indie plans, dployr manages the server for you. On Pro, connect your own VPS from any provider.

      Package contents
      dployr.exe - CLI for managing deployments, services, logs, and clusters
      dployrd.exe - Daemon that runs on your server and executes deploy instructions
    source_repo: "https://push.chocolatey.org/"

# macOS installer with Homebrew
brews:
  - name: dployr
    repository:
      owner: dployr-io
      name: homebrew-dployr
    homepage: https://github.com/dployr-io/homebrew-dployr
    description: "Ship apps, not infrastructure!"
    license: Apache License, Version 2.0
    dependencies:
      - name: caddy
    install: |-
      bin.install "dployr"
      bin.install "dployrd"
    test: |
      system "#{bin}/dployr", "--version"

# Windows package manager
scoops:
  - name: dployr
    repository:
      owner: dployr-io
      name: scoop-dployr
    homepage: https://github.com/dployr-io/scoop-dployr
    description: "Ship apps, not infrastructure!"
    license: Apache License, Version 2.0

release:
  github:
    owner: dployr-io
    name: dployr
  draft: false
  prerelease: auto
  header: |
    ## dployr {{ .Tag }}
    
    ### Installation
    
    **Windows:**
    ```powershell
    # Chocolatey (installs all dependencies)
    choco install dployr
    
    # Scoop
    scoop bucket add dployr https://github.com/dployr-io/scoop-dployr
    scoop install dployr
    
    # Manual
    Invoke-WebRequest -Uri "https://raw.githubusercontent.com/dployr-io/dployr/refs/tags/{{ .Tag }}/install.ps1" -OutFile "install.ps1"
    .\install.ps1
    ```
    
    **macOS:**
    ```bash
    # Homebrew (installs Caddy dependency)
    brew install dployr-io/dployr/dployr
    
    # Manual
    curl -sSL https://raw.githubusercontent.com/dployr-io/dployr/refs/tags/{{ .Tag }}/install.sh | bash
    ```
    
    **Linux:**
    ```bash
    curl -sSL https://raw.githubusercontent.com/dployr-io/dployr/refs/tags/{{ .Tag }}/install.sh | bash
    ```
    
    ### What's Changed
  footer: |
    **Dependencies included:**
    - dployr: CLI client
    - dployrd: daemon service  
    - Caddy: reverse proxy (auto-installed)
    - NSSM: Windows service manager (Windows only, auto-installed)

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"